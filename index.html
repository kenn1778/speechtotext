<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SpeechWeb</title>
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <link rel="preconnect" href="https://speechweb-auth-dev.auth.us-east-1.amazoncognito.com" />
    <link rel="preconnect" href="https://cognito-identity.us-east-1.amazonaws.com" />
    <link rel="dns-prefetch" href="https://speechweb-auth-dev.auth.us-east-1.amazoncognito.com" />
    <style>
      body { margin:0; background:#09090d; color:#f8fafc; font-family:Inter,ui-sans-serif,system-ui,sans-serif; -webkit-font-smoothing:antialiased; }
      .app-loading { display:flex; flex-direction:column; align-items:center; justify-content:center; min-height:100vh; min-height:100dvh; gap:16px; }
      .app-loading-logo { width:48px; height:48px; border-radius:50%; border:1px solid rgba(255,255,255,0.08); display:flex; align-items:center; justify-content:center; font-size:24px; position:relative; }
      .app-loading-ring { position:absolute; inset:-3px; border-radius:50%; border:2px solid transparent; border-top-color:rgba(59,130,246,0.5); animation:spin .8s linear infinite; }
      .app-loading-title { font-size:22px; font-weight:300; letter-spacing:-.01em; color:#f8fafc; margin:0; }
      .app-loading-dot { width:6px; height:6px; border-radius:50%; background:#94a3b8; animation:pulse 1.4s ease-in-out infinite; }
      .app-loading-dot:nth-child(2) { animation-delay:.2s; }
      .app-loading-dot:nth-child(3) { animation-delay:.4s; }
      .app-loading-dots { display:flex; gap:6px; padding-top:4px; }
      @keyframes spin { to { transform:rotate(360deg); } }
      @keyframes pulse { 0%,80%,100% { opacity:.3; } 40% { opacity:1; } }
    </style>
  </head>
  <body>
    <div id="root">
      <div class="app-loading">
        <div class="app-loading-logo">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#f8fafc" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/></svg>
          <div class="app-loading-ring"></div>
        </div>
        <p class="app-loading-title">SpeechWeb</p>
        <div class="app-loading-dots">
          <div class="app-loading-dot"></div>
          <div class="app-loading-dot"></div>
          <div class="app-loading-dot"></div>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
